<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Inspector Hub</title>
<style>
html,body{margin:0;height:100%;background:#0b1b2b}
iframe{border:0;width:100%;height:100vh;display:block;background:#0b1b2b}
</style>
</head>
<body>
<iframe id="hubFrame" src="app.html?v=20260710-40" title="Inspector Hub"></iframe>
<script>
const frame=document.getElementById('hubFrame');
frame.addEventListener('load',()=>{
  const d=frame.contentDocument;
  if(!d||d.getElementById('v2Css'))return;
  const css=d.createElement('link');css.id='v2Css';css.rel='stylesheet';css.href='v2.css?v=20260710-40';d.head.appendChild(css);
  const services=d.createElement('script');services.src='services.js?v=20260710-40';
  services.onload=()=>{
    const v2=d.createElement('script');v2.src='v2.js?v=20260710-40';
    v2.onload=()=>{
      const init=d.createElement('script');init.src='v2-init.js?v=20260710-40';
      init.onload=()=>{
        const fix=d.createElement('script');fix.src='core-fix.js?v=20260710-40';
        fix.onload=()=>{
          const serviceFix=d.createElement('script');serviceFix.src='service-autocomplete-fix.js?v=20260710-40';
          serviceFix.onload=()=>{
            const reports=d.createElement('script');reports.src='report-search.js?v=20260710-40';
            reports.onload=()=>{
              const coverage=d.createElement('script');coverage.src='coverage-direct.js?v=20260710-40';
              coverage.onload=()=>{
                const ux=d.createElement('script');ux.src='ux-save-fix.js?v=20260710-40';
                ux.onload=()=>{
                  const dateFix=d.createElement('script');dateFix.src='date-format-fix.js?v=20260710-40';
                  dateFix.onload=()=>{
                    const polish=d.createElement('script');polish.src='checksheet-polish.js?v=20260710-40';
                    polish.onload=()=>{
                      const nsaPolish=d.createElement('script');nsaPolish.src='nsa-log-polish.js?v=20260710-40';
                      nsaPolish.onload=()=>{
                        const depotFix=d.createElement('script');depotFix.src='nsa-depot-dropdown.js?v=20260710-40';d.body.appendChild(depotFix);
                      };
                      d.body.appendChild(nsaPolish);
                    };
                    d.body.appendChild(polish);
                  };
                  d.body.appendChild(dateFix);
                };
                d.body.appendChild(ux);
              };
              d.body.appendChild(coverage);
            };
            d.body.appendChild(reports);
          };
          d.body.appendChild(serviceFix);
        };
        d.body.appendChild(fix);
      };
      d.body.appendChild(init);
    };
    d.body.appendChild(v2);
  };
  d.body.appendChild(services);
});
</script>
</body>
</html>
