<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Inspector Hub</title>
<style>
html,body{margin:0;height:100%;background:#0b1b2b}
iframe{border:0;width:100%;height:100vh;display:block;background:#0b1b2b}
</style>
</head>
<body>
<iframe id="hubFrame" src="app.html?v=20260710-22" title="Inspector Hub"></iframe>
<script>
const frame=document.getElementById('hubFrame');
frame.addEventListener('load',()=>{
  const d=frame.contentDocument;
  if(!d||d.getElementById('v2Css'))return;
  const css=d.createElement('link');css.id='v2Css';css.rel='stylesheet';css.href='v2.css?v=20260710-22';d.head.appendChild(css);
  const services=d.createElement('script');services.src='services.js?v=20260710-22';
  services.onload=()=>{
    const v2=d.createElement('script');v2.src='v2.js?v=20260710-22';
    v2.onload=()=>{
      const init=d.createElement('script');init.src='v2-init.js?v=20260710-22';
      init.onload=()=>{
        const autocomplete=d.createElement('script');autocomplete.src='service-autocomplete.js?v=20260710-22';d.body.appendChild(autocomplete);
      };
      d.body.appendChild(init);
    };
    d.body.appendChild(v2);
  };
  d.body.appendChild(services);
});
</script>
</body>
</html>
