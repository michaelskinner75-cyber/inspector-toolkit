<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Inspector Toolkit</title>
<style>
html,body{margin:0;height:100%;background:#111}
iframe{border:0;width:100%;height:100vh;display:block;background:#111}
</style>
</head>
<body>
<iframe id="toolkitFrame" src="app.html?v=20260710-13" title="Inspector Toolkit"></iframe>
<script>
const DEPOTS=['Aberhill','Arbroath','Dunfermline','Glenrothes','St Andrews','Perth','Forfar','Blairgowrie','Other'];

function installDepotPicker(doc,inputId,pickerId,otherId){
  const original=doc.getElementById(inputId);
  if(!original || doc.getElementById(pickerId)) return;
  original.type='hidden';
  original.value='';
  const select=doc.createElement('select');
  select.id=pickerId;
  select.className='field';
  select.innerHTML='<option value="">Select depot...</option>'+DEPOTS.map(d=>`<option value="${d}">${d}</option>`).join('');
  const other=doc.createElement('input');
  other.id=otherId;
  other.className='field';
  other.placeholder='Enter custom depot';
  other.style.display='none';
  original.parentNode.insertBefore(select,original);
  original.parentNode.insertBefore(other,original);
  const sync=()=>{
    const isOther=select.value==='Other';
    other.style.display=isOther?'block':'none';
    original.value=isOther?other.value.trim():select.value;
    if(!isOther) other.value='';
  };
  select.addEventListener('change',sync);
  other.addEventListener('input',sync);
}

function resetPicker(doc,pickerId,otherId,inputId){
  const select=doc.getElementById(pickerId);
  const other=doc.getElementById(otherId);
  const original=doc.getElementById(inputId);
  if(select) select.value='';
  if(other){other.value='';other.style.display='none';}
  if(original) original.value='';
}

function formatUkDate(value){
  if(value===undefined||value===null||value==='')return '-';
  const text=String(value).trim();
  const uk=text.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/);
  if(uk){
    const year=uk[3].length===2?'20'+uk[3]:uk[3];
    return `${uk[1].padStart(2,'0')}/${uk[2].padStart(2,'0')}/${year}`;
  }
  const date=new Date(text);
  return isNaN(date)?text:date.toLocaleDateString('en-GB');
}

function formatShortTime(value){
  if(value===undefined||value===null||value==='')return '';
  const text=String(value).trim();
  if(/^\d{1,2}:\d{2}/.test(text))return text.slice(0,5);
  const date=new Date(text);
  return isNaN(date)?'':date.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',hour12:false});
}

function renderNsaSummary(win,doc){
  const box=doc.getElementById('nsaList');
  if(!box||!win.cloud)return;
  const rows=(win.cloud['NSA Faults']||[]).slice(1).reverse();
  box.innerHTML=rows.map(row=>{
    const date=formatUkDate(row[0]);
    const time=formatShortTime(row[1]);
    const inspector=row[2]||'-';
    const depot=row[3]||'-';
    const fleet=row[4]||'-';
    const service=row[5]||'-';

    const newFormat=['Yes','No','N/A'].includes(String(row[7]||'').trim());
    const working=newFormat?String(row[7]||'').trim():'No';
    const fault=newFormat?String(row[8]||'').trim():String(row[7]||'').trim();
    const notes=newFormat?String(row[9]||'').trim():String(row[8]||'').trim();
    const source=newFormat?String(row[12]||'').trim():'Inspector Check Sheet';

    const isWorking=working==='Yes'||fault==='Fully Working';
    const isNA=working==='N/A'||fault==='N/A';
    const cardClass=isNA?'nsa-card-na':(isWorking?'nsa-card-working':'nsa-card-fault');
    const result=isNA?'N/A':(isWorking?'FULLY WORKING':(fault||'FAULT REPORTED'));

    return `<div class="nsa-result-card ${cardClass}">
      <div class="nsa-result-top">
        <strong>${date}${time?' • '+time:''}</strong>
        <span>${result}</span>
      </div>
      <div class="nsa-result-main">${depot} • Fleet ${fleet} • Service ${service}</div>
      <div class="nsa-result-meta">Inspector: ${inspector}${source?' • '+source:''}</div>
      ${!isWorking&&!isNA?`<div class="nsa-result-fault">Fault: ${fault||'Not specified'}</div>`:''}
      ${notes?`<div class="nsa-result-notes">Notes: ${notes}</div>`:''}
    </div>`;
  }).join('')||'No NSA reports loaded.';
}

function addNsaStyles(doc){
  if(doc.getElementById('nsaSummaryStyles'))return;
  const style=doc.createElement('style');
  style.id='nsaSummaryStyles';
  style.textContent=`
    .nsa-result-card{border-radius:11px;padding:12px;margin:9px 0;background:#101010;border-left:8px solid #777}
    .nsa-card-working{border-left-color:#00c853;background:#0b2415}
    .nsa-card-fault{border-left-color:#e53935;background:#2b1010}
    .nsa-card-na{border-left-color:#9e9e9e;background:#1b1b1b}
    .nsa-result-top{display:flex;justify-content:space-between;align-items:center;gap:10px}
    .nsa-result-top span{font-size:14px;font-weight:900}
    .nsa-card-working .nsa-result-top span{color:#69f0ae}
    .nsa-card-fault .nsa-result-top span{color:#ff8a80}
    .nsa-card-na .nsa-result-top span{color:#ddd}
    .nsa-result-main{font-size:16px;font-weight:bold;margin-top:8px}
    .nsa-result-meta{font-size:12px;color:#bbb;margin-top:5px}
    .nsa-result-fault{margin-top:9px;padding:8px;border-radius:7px;background:#521818;color:#fff;font-weight:bold}
    .nsa-result-notes{margin-top:7px;color:#ddd;font-size:13px}
  `;
  doc.head.appendChild(style);
}

function simplifyManualNsa(doc){
  ['nsaDriver','nsaBoarding','nsaDestination'].forEach(id=>{
    const field=doc.getElementById(id);
    if(field){field.value='';field.style.display='none';}
  });
}

function applyToolkitUpdates(){
  const frame=document.getElementById('toolkitFrame');
  const win=frame.contentWindow;
  const doc=frame.contentDocument;
  if(!win||!doc)return;

  installDepotPicker(doc,'csDepot','csDepotPicker','csDepotOther');
  installDepotPicker(doc,'nsaDepot','nsaDepotPicker','nsaDepotOther');
  installDepotPicker(doc,'erDepot','erDepotPicker','erDepotOther');
  simplifyManualNsa(doc);
  addNsaStyles(doc);

  if(!win.__toolkitPatchInstalled){
    win.__toolkitPatchInstalled=true;

    if(typeof win.clearCheckForm==='function'){
      const originalClear=win.clearCheckForm;
      win.clearCheckForm=function(){
        originalClear();
        resetPicker(doc,'csDepotPicker','csDepotOther','csDepot');
      };
      const clearBtn=doc.getElementById('clearCheckFormBtn');
      if(clearBtn)clearBtn.onclick=win.clearCheckForm;
    }

    if(typeof win.saveManualNsa==='function'){
      const originalSaveNsa=win.saveManualNsa;
      win.saveManualNsa=function(){
        ['nsaDriver','nsaBoarding','nsaDestination'].forEach(id=>{const field=doc.getElementById(id);if(field)field.value='';});
        originalSaveNsa();
        resetPicker(doc,'nsaDepotPicker','nsaDepotOther','nsaDepot');
      };
      const btn=doc.getElementById('saveManualNsaBtn');
      if(btn)btn.onclick=win.saveManualNsa;
    }

    if(typeof win.saveEarlyRunning==='function'){
      const originalSaveEarly=win.saveEarlyRunning;
      win.saveEarlyRunning=function(){
        originalSaveEarly();
        resetPicker(doc,'erDepotPicker','erDepotOther','erDepot');
      };
      const btn=doc.getElementById('saveEarlyBtn');
      if(btn)btn.onclick=win.saveEarlyRunning;
    }
  }

  renderNsaSummary(win,doc);
}

document.getElementById('toolkitFrame').addEventListener('load',()=>{
  setTimeout(applyToolkitUpdates,250);
  setTimeout(applyToolkitUpdates,1000);
  setTimeout(applyToolkitUpdates,2500);
  setInterval(applyToolkitUpdates,1000);
});
</script>
</body>
</html>
