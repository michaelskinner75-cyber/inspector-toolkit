name: Update Inspector Hub Display

on:
  push:
    paths:
      - .github/workflows/update-toolkit.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-display:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Replace home display
        run: |
          python <<'PY'
          from pathlib import Path
          import re

          html_path=Path('app.html')
          html=html_path.read_text(encoding='utf-8')

          html=html.replace('<div id="homeClock" class="lcd"></div>\n        <div class="status" id="syncStatus">Cloud ready.</div>', '''<div class="ledTicker" aria-label="Inspector status">
          <div class="ledTickerTrack" id="homeTicker">INSPECTOR HUB • READY</div>
        </div>
        <div class="status" id="syncStatus" style="display:none">Cloud ready.</div>''')

          if '.ledTicker{' not in html:
              html=html.replace('.titleSub{display:block;font-size:13px;font-weight:600;margin-top:4px;letter-spacing:.4px}', '''.titleSub{display:block;font-size:13px;font-weight:600;margin-top:4px;letter-spacing:.4px}
.ledTicker{overflow:hidden;background:#070707;border:3px solid #3f3f3f;border-radius:10px;margin-top:12px;padding:11px 0;white-space:nowrap}
.ledTickerTrack{display:inline-block;min-width:100%;padding-left:100%;font-family:monospace;font-size:18px;font-weight:800;letter-spacing:1.5px;color:#ff8a00;text-shadow:0 0 6px #ff8a00;animation:ledScroll 16s linear infinite}
@keyframes ledScroll{from{transform:translateX(0)}to{transform:translateX(-200%)}}
@media (prefers-reduced-motion:reduce){.ledTickerTrack{animation:none;padding-left:12px}}''')

          html=re.sub(r'src="app\.js\?v=[^"]+"','src="app.js?v=20260710-17"',html)
          html_path.write_text(html,encoding='utf-8')

          js_path=Path('app.js')
          js=js_path.read_text(encoding='utf-8')

          js=js.replace("function setStatus(t){$('syncStatus').textContent=t;}","""function setStatus(t){const status=$('syncStatus');if(status)status.textContent=t;updateHomeTicker(t);}function updateHomeTicker(statusText=''){const ticker=$('homeTicker');if(!ticker)return;const d=new Date();const date=d.toLocaleDateString('en-GB');const time=d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',second:'2-digit'});const inspector=getInspector()||'Not logged in';ticker.textContent=`INSPECTOR HUB • STAGECOACH SOUTH SCOTLAND • ${inspector} • ${date} • ${time}${statusText?' • '+statusText.toUpperCase():''}`;}""")

          js=re.sub(r"\$\('homeClock'\)\.textContent=`DATE \$\{today\(\)\}\\nTIME \$\{now\(\)\}\\nINSPECTOR: \$\{getInspector\(\)\|\|'Not logged in'\}`;","updateHomeTicker();",js)
          js=re.sub(r"function updateLiveClock\(\)\{.*?\}","function updateLiveClock(){updateHomeTicker();}",js)
          js_path.write_text(js,encoding='utf-8')

          index_path=Path('index.html')
          index=index_path.read_text(encoding='utf-8')
          index=re.sub(r'src="app\.html\?v=[^"]+"','src="app.html?v=20260710-17"',index)
          index_path.write_text(index,encoding='utf-8')
          PY
      - name: Commit display update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app.html app.js index.html
          git commit -m "Replace green display with scrolling LED bar" || echo "No changes to commit"
          git push
