name: Add Depot Dropdowns

on:
  push:
    paths:
      - .github/workflows/update-toolkit.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-depots:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update depot fields
        run: |
          python <<'PY'
          from pathlib import Path
          import re

          depot_options = '''<option value="">Select depot...</option>
          <option>Aberhill</option><option>Arbroath</option><option>Dunfermline</option>
          <option>Glenrothes</option><option>St Andrews</option><option>Perth</option>
          <option>Forfar</option><option>Blairgowrie</option><option>Other</option>'''

          app = Path('app.html')
          html = app.read_text(encoding='utf-8')
          html = re.sub(r'href="style\.css(?:\?v=[^"]*)?"','href="style.css?v=20260710-9"',html)
          html = re.sub(r'src="app\.js(?:\?v=[^"]*)?"','src="app.js?v=20260710-9"',html)

          replacements = {
            '<input class="field" id="csDepot" placeholder="Depot">': f'''<select class="field" id="csDepot">{depot_options}</select>
        <input class="field" id="csDepotOther" placeholder="Enter custom depot" style="display:none">''',
            '<input class="field" id="nsaDepot" placeholder="Depot">': f'''<select class="field" id="nsaDepot">{depot_options}</select>
          <input class="field" id="nsaDepotOther" placeholder="Enter custom depot" style="display:none">''',
            '<input class="field" id="erDepot" placeholder="Depot">': f'''<select class="field" id="erDepot">{depot_options}</select>
        <input class="field" id="erDepotOther" placeholder="Enter custom depot" style="display:none">'''
          }
          for old,new in replacements.items():
              if old not in html:
                  raise SystemExit(f'Missing field: {old}')
              html = html.replace(old,new,1)
          app.write_text(html,encoding='utf-8')

          js_path = Path('app.js')
          js = js_path.read_text(encoding='utf-8')
          helper = '''function depotValue(selectId,otherId){
 const selected=$(selectId).value;
 return selected==='Other'?$(otherId).value.trim():selected;
}
function toggleOtherDepot(selectId,otherId){
 const other=$(otherId);
 if(!other)return;
 other.style.display=$(selectId).value==='Other'?'block':'none';
 if($(selectId).value!=='Other')other.value='';
}
'''
          if 'function depotValue(' not in js:
              js = js.replace('async function cloudAppend(sheet,row){',helper+'async function cloudAppend(sheet,row){',1)

          js = js.replace("$('csDepot').value,$('csDriver').value", "depotValue('csDepot','csDepotOther'),$('csDriver').value")
          js = js.replace("$('nsaDepot').value,", "depotValue('nsaDepot','nsaDepotOther'),")
          js = js.replace("$('erDepot').value,", "depotValue('erDepot','erDepotOther'),")
          js = js.replace("$('csDepot').value,$('csFleet').value", "depotValue('csDepot','csDepotOther'),$('csFleet').value")
          js = js.replace("$('csDriver').value,$('csDepot').value,$('csDriverReport').value", "$('csDriver').value,depotValue('csDepot','csDepotOther'),$('csDriverReport').value")

          js = js.replace("['csDepot','csDriver'", "['csDepotOther','csDriver'")
          js = js.replace("['nsaDepot','nsaFleet'", "['nsaDepotOther','nsaFleet'")
          js = js.replace("['erDriver','erDepot','erService'", "['erDriver','erDepotOther','erService'")
          js = js.replace("$('csNSA').value='Yes';", "$('csDepot').value='';$('csDepotOther').style.display='none';$('csNSA').value='Yes';")
          js = js.replace("$('nsaWorking').value='Yes';", "$('nsaDepot').value='';$('nsaDepotOther').style.display='none';$('nsaWorking').value='Yes';")

          old_change = "document.addEventListener('change',e=>{if(e.target.id==='csNSA')syncNsaCategory('csNSA','csNSAFault');"
          new_change = "document.addEventListener('change',e=>{if(e.target.id==='csDepot')toggleOtherDepot('csDepot','csDepotOther');if(e.target.id==='nsaDepot')toggleOtherDepot('nsaDepot','nsaDepotOther');if(e.target.id==='erDepot')toggleOtherDepot('erDepot','erDepotOther');if(e.target.id==='csNSA')syncNsaCategory('csNSA','csNSAFault');"
          if old_change not in js:
              raise SystemExit('Change listener not found')
          js = js.replace(old_change,new_change,1)
          js_path.write_text(js,encoding='utf-8')

          index = Path('index.html')
          launcher = index.read_text(encoding='utf-8')
          launcher = re.sub(r'src="app\.html(?:\?v=[^"]*)?"','src="app.html?v=20260710-9"',launcher)
          index.write_text(launcher,encoding='utf-8')
          PY
      - name: Commit depot update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app.html app.js index.html
          git commit -m "Add depot dropdowns and custom depot entry" || echo "No changes to commit"
          git push
