name: Fix Expanded Inspection Details

on:
  push:
    paths:
      - .github/workflows/update-toolkit.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-details:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch app refresh behaviour
        run: |
          python <<'PY'
          from pathlib import Path
          p = Path('app.js')
          text = p.read_text(encoding='utf-8')
          old = "setInterval(renderAll,1000);"
          new = "setInterval(()=>{const c=document.getElementById('homeClock');if(c)c.textContent=`DATE ${today()}\\nTIME ${now()}\\nINSPECTOR: ${getInspector()}`;},1000);"
          if old not in text:
              raise SystemExit('Expected refresh code not found')
          p.write_text(text.replace(old, new), encoding='utf-8')
          PY
      - name: Commit fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app.js
          git commit -m "Keep inspection details open" || echo "No changes to commit"
          git push
