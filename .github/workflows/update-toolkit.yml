name: Refresh Toolkit Cache

on:
  push:
    paths:
      - .github/workflows/update-toolkit.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-cache:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update cache versions
        run: |
          python <<'PY'
          from pathlib import Path
          import re
          app=Path('app.html')
          text=app.read_text(encoding='utf-8')
          text=re.sub(r'href="style\.css(?:\?v=[^"]*)?"','href="style.css?v=20260710-4"',text)
          text=re.sub(r'src="app\.js(?:\?v=[^"]*)?"','src="app.js?v=20260710-4"',text)
          app.write_text(text,encoding='utf-8')
          index=Path('index.html')
          text=index.read_text(encoding='utf-8')
          text=re.sub(r'src="app\.html(?:\?v=[^"]*)?"','src="app.html?v=20260710-4"',text)
          index.write_text(text,encoding='utf-8')
          PY
      - name: Commit cache refresh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app.html index.html
          git commit -m "Refresh toolkit cache" || echo "No changes to commit"
          git push
