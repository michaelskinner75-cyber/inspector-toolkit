name: Deploy Complete NSA Update

on:
  push:
    paths:
      - .github/workflows/update-toolkit.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Write updated toolkit files
        run: |
          python <<'PY'
          from pathlib import Path
          import base64,gzip,re
          files={
          'app.html':'',
          'app.js':''}
          for name,data in files.items():
              Path(name).write_bytes(gzip.decompress(base64.b64decode(data)))
          index=Path('index.html')
          text=index.read_text(encoding='utf-8')
          text=re.sub(r'src="app\.html(?:\?v=[^"]*)?"','src="app.html?v=20260710-5"',text)
          index.write_text(text,encoding='utf-8')
          PY
      - name: Commit deployment
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app.html app.js index.html
          git commit -m "Complete NSA reporting update" || echo "No changes to commit"
          git push
